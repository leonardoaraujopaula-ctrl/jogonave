<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚀 SPACE SHOOTER - TESTE</title>
  <style>
    body { background: #000; color: white; font-family: Arial; text-align: center; padding: 50px; }
    canvas { border: 3px solid cyan; background: #000; }
  </style>
</head>
<body>
  <h1>TESTE - SPACE SHOOTER</h1>
  <canvas id="game" width="800" height="500"></canvas>
  <p>Clique na tela para atirar</p>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#00ffff';
    ctx.fillRect(370, 400, 60, 55);

    canvas.addEventListener('click', () => {
      alert('Jogo carregou! Clique OK para continuar');
    });
  </script>
</body>
</html>
